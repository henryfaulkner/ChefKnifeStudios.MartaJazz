name: Client CI/CD

on:
  push:
    branches: [main, features/010-github-actions-cicd]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install WASM tools
        run: dotnet workload install wasm-tools

      - name: Publish Blazor app
        run: |
          dotnet publish \
            src/Client/ChefKnifeStudios.MartaJazz.Client.WebApp/ChefKnifeStudios.MartaJazz.Client.WebApp.csproj \
            -c Release /p:BlazorEnableCompression=false

      - uses: actions/upload-artifact@v4
        with:
          name: blazor-client
          path: src/Client/ChefKnifeStudios.MartaJazz.Client.WebApp/bin/Release/net10.0/publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blazor-client
          path: ./client

      - name: Inject production environment header
        run: |
          echo '{"headers":{"Blazor-Environment":"Production"}}' > ./client/staticwebapp.config.json

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_TOKEN }}
          action: upload
          app_location: ./client
          output_location: ""
          skip_app_build: true
